name: Site Build and Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule: # everyday at 2301 UTC or 0001 CET (next day)
    - cron: '1 23 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
    - uses: actions/checkout@v6

    - uses: ./.github/actions/site-setup-and-build

    - name: Restore build cache
      uses: actions/cache@v5
      with:
        path: site/build
        key: site-build-${{ hashFiles('site/content/**', 'site/templates/**', 'site/static/**') }}
        restore-keys: |
          site-build-

    - name: Build site
      run: ./debugjois.dev build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Upload to S3
      run: ./debugjois.dev upload
