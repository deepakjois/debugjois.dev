name: Frontend Dependency Upgrades

on:
  schedule:
    - cron: '22 10 * * 1'
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for upgrades and apply
        id: upgrades
        run: ../.github/scripts/frontend-dep-upgrades.sh

      - name: Check formatting
        if: steps.upgrades.outputs.has_updates == 'true'
        run: npm run fmt:check

      - name: Run lint
        if: steps.upgrades.outputs.has_updates == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.upgrades.outputs.has_updates == 'true'
        run: npm test

      - name: Build frontend
        if: steps.upgrades.outputs.has_updates == 'true'
        run: npm run build
        env:
          VITE_SITE_BACKEND_URL: ${{ secrets.VITE_SITE_BACKEND_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Create Pull Request
        if: steps.upgrades.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: deps/frontend-upgrades
          title: "frontend: upgrade npm dependencies"
          body: ${{ steps.upgrades.outputs.body }}
          commit-message: "frontend: upgrade npm dependencies"
          labels: dependencies
          delete-branch: true
