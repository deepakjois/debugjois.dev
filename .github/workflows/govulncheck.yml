name: govulncheck

on:
  push:
  pull_request:
  schedule:
    - cron: '22 10 * * *'

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-and-build
        with:
          build: 'false'
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
