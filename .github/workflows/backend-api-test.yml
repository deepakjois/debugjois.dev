name: Backend API Test

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/api/**'
      - 'go.work'
      - '.github/workflows/backend-api-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/api/go.mod
          cache: true
      - name: Run tests
        run: go test ./...
