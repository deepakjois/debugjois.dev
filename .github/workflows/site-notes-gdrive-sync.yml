name: Site Recent Notes GDrive Sync

on:
  workflow_dispatch: null  # disabled: trigger manually if needed

jobs:
  sync-notes:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            site/go.sum
            go.work.sum
      - name: Write Google Drive credentials file
        shell: bash
        run: printf '%s' '${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}' > "$RUNNER_TEMP/gdrive-credentials.json"
      - name: Build site binary
        run: go build -o debugjois-site .
      - name: Sync recent notes to Google Drive
        run: ./debugjois-site sync-notes-to-gdrive --folder-id="${{ vars.GOOGLE_DRIVE_FOLDER_ID }}" --creds "$RUNNER_TEMP/gdrive-credentials.json"
