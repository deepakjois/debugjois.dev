name: Frontend Test and Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-test-deploy.yml'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: ./.github/actions/frontend-validate
        with:
          vite-site-backend-url: ${{ secrets.VITE_SITE_BACKEND_URL }}
          vite-google-client-id: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Deploy frontend
        run: aws s3 sync ../site/build/app s3://debugjois-dev-site/app/ --delete
