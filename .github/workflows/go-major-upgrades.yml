name: Go Major Version Upgrades

on:
  schedule:
    - cron: '30 10 1 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
          cache-dependency-path: site/go.sum

      - name: Install gomajor
        run: go install github.com/icholy/gomajor@latest

      - name: Check for major version upgrades
        id: upgrades
        run: .github/scripts/go-major-upgrades.sh

      - name: Create or update issue
        if: steps.upgrades.outputs.has_upgrades == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPGRADE_BODY: ${{ steps.upgrades.outputs.body }}
        run: .github/scripts/go-major-upgrades-issue.sh
