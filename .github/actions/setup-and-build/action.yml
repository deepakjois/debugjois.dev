name: Setup Go and Build
description: Set up Go version from go.mod and optionally compile the project (checkout must happen before calling this action)

inputs:
  build:
    description: Whether to build the project
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build
      if: inputs.build == 'true'
      shell: bash
      run: go build ./...
