name: Setup Go and Build Site
description: Set up Go version from go.mod and optionally compile the site project (checkout must happen before calling this action)

inputs:
  build:
    description: Whether to build the project
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'site/go.mod'
        cache: true
        cache-dependency-path: 'site/go.sum'

    - name: Build
      if: inputs.build == 'true'
      shell: bash
      working-directory: site
      run: go build -o debugjois-site .
